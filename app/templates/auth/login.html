{% extends "base.html" %}

{% block title %}Login — OctaneFlow{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: calc(80vh - 70px);">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
        <div class="card card-premium shadow-lg animate-fade-in border-0">
            <div class="card-body card-body-premium p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-fuel-pump-fill fs-1 text-primary"></i>
                    </div>
                    <h3 class="mb-1 fw-bold">Welcome to OctaneFlow</h3>
                    <p class="text-muted-custom">Fuel Station Management Control</p>
                </div>
                
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <!-- Username / Email Field -->
                    <div class="mb-3">
                        <label for="email" class="form-label form-label-custom">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0" style="border-color: var(--border-color); color: var(--text-secondary);">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" class="form-control form-control-custom border-start-0 ps-0" id="email" name="email" placeholder="name@fuel.com" required autocomplete="email">
                        </div>
                    </div>
                    
                    <!-- Password Field -->
                    <div class="mb-3">
                        <label for="password" class="form-label form-label-custom">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0" style="border-color: var(--border-color); color: var(--text-secondary);">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control form-control-custom border-start-0 ps-0" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                        </div>
                    </div>
                    
                    <!-- Remember Me Checkbox -->
                    <div class="mb-4 d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember" name="remember">
                            <label class="form-check-label text-muted-custom" style="font-size: 0.9rem;" for="remember">
                                Remember this device
                            </label>
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary-custom w-100 py-2.5">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Access Dashboard
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
