{% extends "base.html" %}

{% block title %}Login — OctaneFlow{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="card card-premium auth-card animate-fade-in">
        <div class="card-body card-body-premium p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="auth-logo">
                    <img src="{{ url_for('static', filename='img/logo.png') }}?v=2" alt="OctaneFlow" width="64" height="64">
                </div>
                <h1 class="auth-title">Welcome to OctaneFlow</h1>
                <p class="text-muted-custom mb-0">Fuel Station Management Control</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label form-label-custom">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control form-control-custom" id="email" name="email" placeholder="name@fuel.com" required autocomplete="email">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label form-label-custom">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control form-control-custom" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>
                
                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember" name="remember">
                        <label class="form-check-label text-muted-custom" for="remember">Remember this device</label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Access Dashboard
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
