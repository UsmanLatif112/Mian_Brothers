{# Shared compact period filter — expects period, start_date, end_date, period_choices #}
<form method="GET" class="period-filter period-filter-compact mb-3" id="period-filter-form">
    <select name="period" id="period-select" class="form-select form-control-custom period-select" aria-label="Period">
        {% for value, label in period_choices %}
        <option value="{{ value }}" {% if period == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
    <div class="period-custom-dates custom-dates {% if period != 'custom' %}d-none{% endif %}">
        <input type="date" name="start_date" class="form-control form-control-custom period-date" value="{{ start_date }}" aria-label="From date">
        <span class="period-date-sep">–</span>
        <input type="date" name="end_date" class="form-control form-control-custom period-date" value="{{ end_date }}" aria-label="To date">
        <button type="submit" class="btn btn-primary-custom period-filter-submit" title="Apply">
            <i class="bi bi-check-lg"></i>
        </button>
    </div>
</form>
<span class="period-range-badge d-inline-flex mb-3"><i class="bi bi-calendar3"></i>{{ start_date }} → {{ end_date }}</span>
<script>
(function () {
    const form = document.getElementById('period-filter-form');
    const sel = document.getElementById('period-select');
    if (!form || !sel) return;
    const dateInputs = form.querySelectorAll('[name="start_date"], [name="end_date"]');
    const syncDates = () => {
        const isCustom = sel.value === 'custom';
        dateInputs.forEach((el) => { el.disabled = !isCustom; });
        document.querySelectorAll('.custom-dates').forEach(el => {
            el.classList.toggle('d-none', !isCustom);
        });
    };
    syncDates();
    sel.addEventListener('change', () => {
        syncDates();
        if (sel.value !== 'custom') form.submit();
    });
})();
</script>
