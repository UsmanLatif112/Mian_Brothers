{# Shared period filter — expects period, start_date, end_date, period_choices #}
<form method="GET" class="row g-2 align-items-end mb-4" id="period-filter-form">
    <div class="col-auto">
        <label class="form-label form-label-custom mb-1">Period</label>
        <select name="period" id="period-select" class="form-select form-control-custom" style="min-width: 160px;">
            {% for value, label in period_choices %}
            <option value="{{ value }}" {% if period == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-auto custom-dates {% if period != 'custom' %}d-none{% endif %}">
        <label class="form-label form-label-custom mb-1">From</label>
        <input type="date" name="start_date" class="form-control form-control-custom" value="{{ start_date }}">
    </div>
    <div class="col-auto custom-dates {% if period != 'custom' %}d-none{% endif %}">
        <label class="form-label form-label-custom mb-1">To</label>
        <input type="date" name="end_date" class="form-control form-control-custom" value="{{ end_date }}">
    </div>
    <div class="col-auto">
        <button type="submit" class="btn btn-primary-custom">
            <i class="bi bi-funnel me-1"></i> Apply
        </button>
    </div>
    <div class="col-auto ms-auto text-muted-custom small align-self-center">
        {{ start_date }} → {{ end_date }}
    </div>
</form>
<script>
(function () {
    const sel = document.getElementById('period-select');
    if (!sel) return;
    const toggle = () => {
        document.querySelectorAll('.custom-dates').forEach(el => {
            el.classList.toggle('d-none', sel.value !== 'custom');
        });
        if (sel.value !== 'custom') {
            document.getElementById('period-filter-form').submit();
        }
    };
    sel.addEventListener('change', toggle);
})();
</script>
